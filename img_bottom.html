<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>img 요소 하단의 알 수 없는 여백 파헤치기</title>
    <style>
        /* img 요소 하단에 여백이 생기는 이유는 img 요소는 inline 요소이기 때문이다 */
        /* inline 요소에는 baseline 이라는 기준선이 있고 p, y와 같이 아래 삐침이 있는 문자를 쓰기 위해 베이스라인 밑으로 약간의 여백을 설정해 놓는다. */
        .wrapper{
            border: 1px solid #000;
        }

        img{
            vertical-align: top;
        }
        
        span{
            background-color: orange;
            padding-left: 4px;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <span>
            <img src="https://pixabay.com/get/gdcc8a139f72b0fe41667b8b2d86eadfb6b5c639b972692d7f654972473f8a209bccc59c42e1da09b9950d1c066681caebc72a782f9e99a57ff8c27383b4c7094bd98fd91a4493de351f7cf21af8579e9_640.jpg" alt="">
            apple banana cherry
        </span>
    </div>

    <!-- line-height와 vertical-align에 대한 참고글 : https://wit.nts-corp.com/2017/09/25/4903 -->
</body>
</html>
